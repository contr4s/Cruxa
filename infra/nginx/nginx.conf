server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 256;

    # Force DNS re-resolution on each request (Docker DNS @ 127.0.0.11)
    resolver 127.0.0.11 valid=10s;

    # API proxy
    location /api/ {
        set $backend http://api:80;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (passthrough to API)
    location /_health {
        set $backend_health http://api:80;
        proxy_pass $backend_health;
    }

    # SPA — все пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets with content hashes — долгий кэш
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — никогда не кэшировать
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
