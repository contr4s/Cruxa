version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cruxa
      PGPORT: 5433
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-p", "5433"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend-dist:/app/dist
    command: sh -c "npm install --ignore-engines && npm run build"
    restart: no

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: src/Cruxa.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_HTTP_PORTS: ""
      ConnectionStrings__DefaultConnection: "Host=db;Port=5433;Database=cruxa;Username=postgres;Password=postgres"
      Cors__AllowedOrigins: "http://localhost:80"
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  frontend-dist:
